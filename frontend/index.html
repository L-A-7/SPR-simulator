<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPR Simulator</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">

    <!-- ── Content row: left panel + main column ─────────────────── -->
    <div id="content-row">

      <!-- ── Left panel ───────────────────────────────────────────── -->
      <div id="left-panel">

        <div class="panel-box" id="params-box">
          <h2>Parameters</h2>
          <div class="field">
            <label>λ (nm)</label>
            <input type="number" id="lam-nm" value="632.8" min="400" max="1100" step="0.1" />
          </div>
          <div class="field">
            <label>h-gold (nm)</label>
            <input type="number" id="gold-nm" value="50" min="1" max="200" step="1" />
          </div>
          <div class="field">
            <label>n-prism</label>
            <input type="number" id="prism-n" value="1.5" min="1.4" max="2.0" step="0.001" />
          </div>
          <div class="field">
            <label>n-top</label>
            <input type="number" id="top-n" value="1.33" min="1.0" max="1.8" step="0.001" />
          </div>
        </div>

        <!-- angle-scan-wrap: two separate boxes on desktop,
           fused into one 2-row panel on mobile              -->
        <div id="angle-scan-wrap">

          <div class="panel-box" id="angle-box">
            <h2>Angle</h2>
            <div class="angle-big"><span id="angle-display">65.0</span>°</div>
            <div class="field" id="angle-slider-field">
              <input type="range" id="angle-slider" min="5" max="85" step="0.5" value="65" />
            </div>
            <div class="field" id="angle-manual-field">
              <label>Manual entry (°)</label>
              <input type="number" id="angle-input" min="5" max="85" step="0.1" value="65" />
            </div>
          </div>

          <div class="panel-box" id="scan-box">
            <h2>Angle Scan</h2>
            <div id="scan-params">
              <div class="field">
                <label>From (°)</label>
                <input type="number" id="scan-min" value="45" min="0" max="89" step="1" />
              </div>
              <div class="field">
                <label>To (°)</label>
                <input type="number" id="scan-max" value="85" min="1" max="89" step="1" />
              </div>
              <div class="field">
                <label>Steps</label>
                <input type="number" id="scan-steps" value="150" min="20" max="500" step="10" />
              </div>
            </div>
            <button class="btn btn-scan" id="btn-scan">▶ Run Scan</button>
            <button class="btn btn-stop" id="btn-stop">■ Stop</button>
            <div id="scan-status"></div>
            <button class="btn btn-scan-2" id="btn-export">↓ Export</button>
            <div id="export-status"></div>
          </div>

        </div><!-- /angle-scan-wrap -->

      </div><!-- /left-panel -->

      <!-- ── Main column ──────────────────────────────────────────── -->
      <div id="main-col">

        <!-- Observable bar + canvas -->
        <div id="main-anim-box">

          <div id="obs-bar">
            <div id="obs-items">
              <span id="obs-title">SPR Simulator</span>
              <span class="obs-sep">|</span>
              <span class="obs-item">
                <span class="obs-lbl">θ</span>
                <span class="obs-val obs-theta" id="obs-theta">65.0</span><span class="obs-unit">°</span>
              </span>
              <span class="obs-sep">|</span>
              <span class="obs-item">
                <span class="obs-lbl">λ</span>
                <span class="obs-val" id="obs-lam">632.8</span><span class="obs-unit"> nm</span>
              </span>
              <span class="obs-sep">|</span>
              <span class="obs-item">
                <span class="obs-lbl">Rp</span>
                <span class="obs-val rv-rp" id="rv-rp">—</span>
              </span>
              <span class="obs-sep">|</span>
              <span class="obs-item">
                <span class="obs-lbl">Rs</span>
                <span class="obs-val rv-rs" id="rv-rs">—</span>
              </span>
              <span class="obs-sep">|</span>
              <span class="obs-item">
                <span class="obs-lbl">Abs.</span>
                <span class="obs-val rv-abs" id="rv-abs">—</span>
              </span>
              <!-- <span class="obs-sep">|</span> -->
              <!-- <span class="obs-item"> -->
              <!-- <span class="obs-lbl">Field enh.</span> -->
              <!-- <span class="obs-val rv-field" id="rv-field">—</span> -->
              <!-- </span> -->
            </div>
            <button id="theme-toggle" title="Toggle light / dark theme">☽</button>
          </div>

          <div id="canvas-wrap">
            <canvas id="diagram" width="700" height="279"></canvas>
          </div>

        </div>

        <!-- Curves 1 — scan results -->
        <div id="charts-panel">
          <h2>Scan Results</h2>
          <div id="charts"></div>
        </div>

        <!-- Curves 2 — reflection phase shifts -->
        <div class="panel-box" id="curves-2-panel">
          <h2>Reflection Phase</h2>
          <div id="charts2"></div>
        </div>

      </div><!-- /main-col -->

    </div><!-- /content-row -->

  </div><!-- /app -->

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
